<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="referrer" content="no-referrer" />
    <title>Grafana2PDF</title>
    <style>
      :root {
        color-scheme: light dark;
        font-family:
          system-ui,
          -apple-system,
          BlinkMacSystemFont,
          'Segoe UI',
          sans-serif;
        line-height: 1.6;
      }
      body {
        margin: 0;
        background: #0b1220;
        color: #e5edf8;
      }
      main {
        width: min(680px, calc(100% - 2rem));
        margin: 10vh auto;
        box-sizing: border-box;
        padding: clamp(1.5rem, 5vw, 3rem);
        border: 1px solid #26364f;
        border-radius: 18px;
        background: #111c2e;
      }
      h1 {
        margin-top: 0;
      }
      p {
        color: #c4d0e1;
      }
      a {
        display: inline-block;
        margin-top: 0.75rem;
        padding: 0.75rem 1rem;
        border-radius: 10px;
        background: #ff7a1a;
        color: #15100b;
        font-weight: 700;
        text-decoration: none;
      }
      a:focus-visible {
        outline: 3px solid #fff;
        outline-offset: 3px;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>Grafana2PDF</h1>
      <p>
        Grafana2PDF exports user-selected Grafana dashboards as local full-page PDF and PNG files using the user's
        existing signed-in browser session.
      </p>
      <a href="privacy/">Read the privacy policy</a>
    </main>
  </body>
</html>
